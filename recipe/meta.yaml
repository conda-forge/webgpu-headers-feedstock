{% set githash_version = "7d3186c3dd2c708703524027b46b8703534ab3cc" %}
{% set version = "0.0.0.2026.3.19." + githash_version[:7] %}

package:
  name: webgpu-headers
  version: {{ version }}

source:
  url: https://github.com/webgpu-native/webgpu-headers/archive/{{ githash_version }}.tar.gz
  sha256: c9f0e1738491ece444675a261277d73562b98bcf9c759fe76dd5692ee193c191

build:
  noarch: generic
  number: 0

requirements:
  run:
    - __unix  # [unix]
    - __win   # [win]

test:
  commands:
    - test -f ${PREFIX}/include/webgpu.h   # [unix]
    - if not exist %PREFIX%\\Library\\include\\webgpu.h exit 1  # [win]

about:
  home: https://github.com/webgpu-native/webgpu-headers
  summary: WebGPU Headers
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hmaarrfk
